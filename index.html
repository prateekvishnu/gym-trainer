<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Trainer — Exercise Library & Plans</title>
<style>
  :root{
    --bg:#0d1119; --bg2:#0f1420; --card:#161d2c; --card2:#1c2438; --ink:#e9eef8;
    --muted:#94a2bd; --line:#28324c; --accent:#5b8cff; --accent2:#3ad29f; --warn:#ffb347;
    --chip:#1a2233;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  a{color:var(--accent)}
  button{font-family:inherit;cursor:pointer}

  /* ---- top bar ---- */
  .topbar{position:sticky;top:0;z-index:40;background:rgba(13,17,25,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line)}
  .topbar-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:16px;
    padding:12px 18px;flex-wrap:wrap}
  .brand{font-weight:800;font-size:1.15rem;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
  .tabs{display:flex;gap:6px;margin-left:8px}
  .tab{background:transparent;border:1px solid transparent;color:var(--muted);
    padding:8px 16px;border-radius:10px;font-weight:600;font-size:.92rem}
  .tab.active{background:var(--card2);color:#fff;border-color:var(--line)}
  .search{margin-left:auto;position:relative}
  .search input{background:var(--card);border:1px solid var(--line);color:var(--ink);
    padding:9px 14px 9px 34px;border-radius:10px;width:240px;font-size:.9rem;outline:none}
  .search input:focus{border-color:var(--accent)}
  .search::before{content:"🔍";position:absolute;left:11px;top:8px;font-size:.85rem;opacity:.6}
  .plan-count{background:var(--accent);color:#0b0f1a;font-weight:800;border-radius:999px;
    padding:2px 9px;font-size:.75rem;margin-left:6px}

  .wrap{max-width:1280px;margin:0 auto;padding:20px 18px 90px}

  /* ---- filters ---- */
  .filters{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:18px}
  .filter-row{display:flex;align-items:flex-start;gap:12px;margin:8px 0;flex-wrap:wrap}
  .filter-label{min-width:96px;color:var(--muted);font-size:.8rem;font-weight:700;
    text-transform:uppercase;letter-spacing:.5px;padding-top:6px}
  .chips{display:flex;gap:7px;flex-wrap:wrap;flex:1}
  .chip{background:var(--chip);border:1px solid var(--line);color:var(--ink);
    padding:6px 13px;border-radius:999px;font-size:.83rem;font-weight:600;transition:.12s}
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--accent);color:#0b0f1a;border-color:var(--accent)}
  .chip.eq.on{background:var(--accent2);border-color:var(--accent2)}
  .filter-foot{display:flex;align-items:center;gap:14px;margin-top:12px;padding-top:12px;
    border-top:1px solid var(--line);flex-wrap:wrap}
  .filter-foot select{background:var(--card);border:1px solid var(--line);color:var(--ink);
    padding:7px 10px;border-radius:8px;font-size:.85rem}
  .result-count{color:var(--muted);font-size:.85rem}
  .clear-btn{background:transparent;border:1px solid var(--line);color:var(--muted);
    padding:6px 12px;border-radius:8px;font-size:.8rem;margin-left:auto}
  .clear-btn:hover{color:#fff;border-color:var(--warn)}

  /* ---- grid ---- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    display:flex;flex-direction:column;transition:transform .12s,border-color .12s;position:relative}
  .card:hover{transform:translateY(-3px);border-color:var(--accent)}
  .media{background:#fff;aspect-ratio:1/1;position:relative;cursor:pointer;display:flex;
    align-items:center;justify-content:center;overflow:hidden}
  .media img{width:100%;height:100%;object-fit:contain}
  .media .missing{color:#556;font-size:.8rem;text-align:center;padding:12px}
  .add-btn{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;
    border:none;background:rgba(13,17,25,.82);color:#fff;font-size:1.1rem;font-weight:700;
    display:flex;align-items:center;justify-content:center;line-height:1;z-index:2}
  .add-btn.on{background:var(--accent2);color:#0b0f1a}
  .card-body{padding:11px 13px 13px}
  .card-body h3{margin:0 0 7px;font-size:.92rem;line-height:1.25}
  .badges{display:flex;gap:5px;flex-wrap:wrap}
  .badge{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:999px}
  .badge.bp{background:rgba(91,140,255,.16);color:#a9c2ff}
  .badge.eq{background:rgba(58,210,159,.16);color:#7fe6c4}
  .badge.lv{font-weight:800}
  .badge.lv.beginner{background:rgba(58,210,159,.18);color:#7fe6c4}
  .badge.lv.intermediate{background:rgba(255,179,71,.18);color:#ffcf94}
  .badge.lv.advanced{background:rgba(255,99,99,.18);color:#ff9b9b}
  .badge.reps{background:rgba(148,162,189,.16);color:#c3cee2}
  .fav-btn{position:absolute;top:8px;left:8px;width:30px;height:30px;border-radius:50%;
    border:none;background:rgba(13,17,25,.82);color:#fff;font-size:1rem;line-height:1;z-index:2;
    display:flex;align-items:center;justify-content:center}
  .fav-btn.on{color:#ffd24a}
  .chip.fav.on{background:#ffd24a;color:#0b0f1a;border-color:#ffd24a}
  #sentinel{height:40px}
  .empty{text-align:center;color:var(--muted);padding:70px 20px}

  /* ---- modal ---- */
  .modal{position:fixed;inset:0;z-index:60;background:rgba(5,8,14,.72);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:20px}
  .modal.open{display:flex}
  .modal-inner{background:var(--card);border:1px solid var(--line);border-radius:18px;
    max-width:820px;width:100%;max-height:88vh;overflow:auto;display:grid;grid-template-columns:1fr 1fr}
  .modal-media{background:#fff;display:flex;align-items:center;justify-content:center}
  .modal-media img{width:100%;height:100%;object-fit:contain;max-height:88vh}
  .modal-info{padding:22px 24px}
  .modal-info h2{margin:0 0 10px;font-size:1.3rem}
  .modal-info .badges{margin-bottom:14px}
  .modal-info h4{margin:16px 0 8px;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .steps{margin:0;padding-left:20px}
  .steps li{margin-bottom:8px;font-size:.9rem;color:#d4ddf0}
  .modal-actions{display:flex;gap:10px;margin-top:20px}
  .btn{border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:.9rem}
  .btn.primary{background:var(--accent2);color:#0b1018}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .modal-close{position:absolute;top:16px;right:20px;font-size:1.6rem;background:none;border:none;
    color:#fff;opacity:.7;z-index:2}
  .modal-close:hover{opacity:1}

  /* ---- plans ---- */
  .subtabs{display:flex;gap:8px;margin-bottom:20px}
  .subtab{background:var(--card);border:1px solid var(--line);color:var(--muted);
    padding:9px 18px;border-radius:10px;font-weight:600}
  .subtab.active{background:var(--accent);color:#0b0f1a;border-color:var(--accent)}
  .plan{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:20px 22px;margin-bottom:20px}
  .plan-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .plan-head h2{margin:0 0 4px;font-size:1.25rem}
  .plan-head p{margin:0;color:var(--muted);font-size:.88rem;max-width:640px}
  .plan-tag{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:999px;
    background:rgba(255,179,71,.16);color:var(--warn);white-space:nowrap}
  .day{margin-top:16px}
  .day h3{font-size:.95rem;margin:0 0 10px;color:var(--accent2)}
  .mini-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .mini{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;cursor:pointer}
  .mini .media{aspect-ratio:1/1}
  .mini span{display:block;padding:7px 9px;font-size:.76rem;line-height:1.2}
  .plan-empty{text-align:center;color:var(--muted);padding:60px 20px}
  .plan-empty .btn{margin-top:16px}
  @media (max-width:640px){ .modal-inner{grid-template-columns:1fr} .search input{width:150px} }

  /* ---- print / export PDF (My Plan) ---- */
  .print-only{display:none}
  @media print{
    @page{margin:14mm}
    body{background:#fff;color:#000}
    .topbar,.filters,.subtabs,.add-btn,.fav-btn,.modal,#browseView,
    .plan-head .btn,[data-rm]{display:none!important}
    .print-only{display:block;margin-bottom:14px}
    .print-only h1{margin:0 0 2px;font-size:20pt}
    .print-only p{margin:0;color:#555;font-size:9pt}
    .plan{border:none;padding:0;background:#fff}
    .plan-head h2,.plan-head p{color:#000}
    .mini-grid{display:block!important}
    .mini{display:flex;align-items:center;gap:12px;border:1px solid #ccc;border-radius:8px;
      margin-bottom:8px;page-break-inside:avoid;background:#fff}
    .mini .media{width:70px;height:70px;flex:0 0 70px;aspect-ratio:auto;background:#fff}
    .mini span{color:#000;font-size:11pt;font-weight:600;padding:0 10px}
    .mini .p-reps{display:inline-block;color:#444;font-weight:500;font-size:10pt}
    .day h3{color:#000;border-bottom:1px solid #000;padding-bottom:3px}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">🏋️ Gym Trainer</div>
    <div class="tabs">
      <button class="tab active" data-view="browse">Exercises</button>
      <button class="tab" data-view="plans">Plans <span class="plan-count" id="planCountBadge">0</span></button>
    </div>
    <div class="search"><input id="searchInput" type="text" placeholder="Search exercises…"></div>
  </div>
</div>

<!-- ============ BROWSE VIEW ============ -->
<div class="wrap" id="browseView">
  <div class="filters">
    <div class="filter-row">
      <div class="filter-label">Target area</div>
      <div class="chips" id="bodyChips"></div>
    </div>
    <div class="filter-row">
      <div class="filter-label">Tools</div>
      <div class="chips" id="equipChips"></div>
    </div>
    <div class="filter-row">
      <div class="filter-label">Level</div>
      <div class="chips" id="diffChips"></div>
    </div>
    <div class="filter-foot">
      <button class="chip fav" id="favToggle">★ Favorites only</button>
      <label>Muscle:
        <select id="muscleSelect"><option value="">Any</option></select>
      </label>
      <label>Type:
        <select id="categorySelect"><option value="">Any</option></select>
      </label>
      <span class="result-count" id="resultCount"></span>
      <button class="clear-btn" id="clearBtn">Clear filters</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <div id="sentinel"></div>
  <div class="empty" id="emptyState" style="display:none">No exercises match those filters.</div>
</div>

<!-- ============ PLANS VIEW ============ -->
<div class="wrap" id="plansView" style="display:none">
  <div class="subtabs">
    <button class="subtab active" data-sub="ready">Ready-Made Plans</button>
    <button class="subtab" data-sub="mine">My Plan <span class="plan-count" id="myPlanBadge">0</span></button>
  </div>
  <div id="readyPlans"></div>
  <div id="myPlan" style="display:none"></div>
</div>

<!-- ============ MODAL ============ -->
<div class="modal" id="modal">
  <div class="modal-inner">
    <button class="modal-close" id="modalClose">×</button>
    <div class="modal-media"><img id="modalImg" alt=""></div>
    <div class="modal-info">
      <h2 id="modalTitle"></h2>
      <div class="badges" id="modalBadges"></div>
      <h4>Instructions</h4>
      <ol class="steps" id="modalSteps"></ol>
      <div class="modal-actions">
        <button class="btn primary" id="modalAdd"></button>
        <button class="btn ghost" id="modalFav"></button>
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
const EX = window.EXERCISES || [];
const byId = Object.fromEntries(EX.map(e => [e.id, e]));

/* ---------- image loading: CDN primary, local fallback ---------- */
const CDN_BASE = "https://cdn.jsdelivr.net/gh/JahelCuadrado/ExerciseGymGifsDB@v1.1.0/";
const cdnUrl = e => CDN_BASE + e.gif.replace(/^assets\/gifs\//, "");
function imgFallback(img){
  const step = +(img.dataset.step || 0);
  if(step === 0 && img.dataset.local){        // CDN failed → try local copy
    img.dataset.step = 1; img.src = img.dataset.local;
  }else{                                       // both failed → placeholder
    img.onerror = null; img.style.display = "none";
    img.parentNode.insertAdjacentHTML("beforeend", '<div class="missing">image unavailable</div>');
  }
}
const imgTag = e =>
  `<img loading="lazy" alt="${e.name}" src="${cdnUrl(e)}" data-local="${e.gif}" onerror="imgFallback(this)">`;

const BP_LABEL = {chest:"Chest",back:"Back",shoulders:"Shoulders",arms:"Arms",legs:"Legs",core:"Core",cardio:"Cardio"};
const EQ_LABEL = {dumbbell:"Dumbbell",barbell:"Barbell","ez-bar":"EZ-Bar",kettlebell:"Kettlebell",
  bodyweight:"Bodyweight",cable:"Cable",machine:"Machine",smith:"Smith",lever:"Lever",band:"Band",sled:"Sled",other:"Other"};
const EQ_ORDER = ["dumbbell","barbell","ez-bar","kettlebell","bodyweight","cable","smith","lever","machine","band","sled","other"];
const BP_ORDER = ["chest","back","shoulders","arms","legs","core","cardio"];
const DIFF_ORDER = ["beginner","intermediate","advanced"];
const cap = s => s ? s.charAt(0).toUpperCase()+s.slice(1).replace(/-/g," ") : s;

/* ---------- sets/reps prescription (auto from movement type) ---------- */
const COMPOUND_RE = /(squat|deadlift|bench press|\brow\b|overhead press|military|shoulder press|lunge|pull-?up|chin-?up|\bdip\b|clean|snatch|thruster|press-?up|push-?up)/i;
function prescribe(e){
  if(e.category==="stretching") return "Hold 20–30s";
  if(e.category==="cardio")     return "10–20 min";
  if(e.category==="plyometrics")return "3 × 8–10";
  if(COMPOUND_RE.test(e.name))  return e.diff==="advanced" ? "4 × 4–6" : "4 × 6–10";
  return "3 × 10–15";            // isolation default
}

/* ---------- filter state ---------- */
const state = { q:"", body:new Set(), equip:new Set(), diff:new Set(), muscle:"", category:"", favOnly:false };

/* ---------- favorites (localStorage) ---------- */
let favs = new Set(JSON.parse(localStorage.getItem("favs") || "[]"));
const isFav = id => favs.has(id);
function toggleFav(id){
  favs.has(id) ? favs.delete(id) : favs.add(id);
  localStorage.setItem("favs", JSON.stringify([...favs]));
  refreshFavButtons();
  if(state.favOnly) render();
}
function refreshFavButtons(){
  document.querySelectorAll(".fav-btn").forEach(b=>{
    const on=isFav(b.dataset.id); b.classList.toggle("on",on); b.textContent = on?"★":"☆";
  });
}

/* ---------- my plan (localStorage) ---------- */
let myPlan = JSON.parse(localStorage.getItem("myPlan") || "[]");
const savePlan = () => { localStorage.setItem("myPlan", JSON.stringify(myPlan)); updatePlanBadges(); };
const inPlan = id => myPlan.includes(id);
function togglePlan(id){
  const i = myPlan.indexOf(id);
  if(i>=0) myPlan.splice(i,1); else myPlan.push(id);
  savePlan();
}
function updatePlanBadges(){
  document.getElementById("planCountBadge").textContent = myPlan.length;
  document.getElementById("myPlanBadge").textContent = myPlan.length;
  document.querySelectorAll(".add-btn").forEach(b=>{
    const on = inPlan(b.dataset.id);
    b.classList.toggle("on",on); b.textContent = on ? "✓" : "+";
  });
}

/* ---------- build filter chips ---------- */
function buildChips(){
  const bc = document.getElementById("bodyChips");
  BP_ORDER.filter(b=>EX.some(e=>e.bodyPart===b)).forEach(b=>{
    const el=document.createElement("button");
    el.className="chip"; el.textContent=BP_LABEL[b]||cap(b); el.dataset.v=b;
    el.onclick=()=>{ state.body.has(b)?state.body.delete(b):state.body.add(b); el.classList.toggle("on"); render(); };
    bc.appendChild(el);
  });
  const ec = document.getElementById("equipChips");
  EQ_ORDER.filter(q=>EX.some(e=>e.equipment===q)).forEach(q=>{
    const el=document.createElement("button");
    el.className="chip eq"; el.textContent=EQ_LABEL[q]||cap(q); el.dataset.v=q;
    el.onclick=()=>{ state.equip.has(q)?state.equip.delete(q):state.equip.add(q); el.classList.toggle("on"); render(); };
    ec.appendChild(el);
  });
  const dc=document.getElementById("diffChips");
  DIFF_ORDER.forEach(d=>{
    const el=document.createElement("button");
    el.className="chip"; el.textContent=cap(d); el.dataset.v=d;
    el.onclick=()=>{ state.diff.has(d)?state.diff.delete(d):state.diff.add(d); el.classList.toggle("on"); render(); };
    dc.appendChild(el);
  });
  const ms=document.getElementById("muscleSelect");
  [...new Set(EX.map(e=>e.muscle))].sort().forEach(m=>{
    const o=document.createElement("option"); o.value=m; o.textContent=cap(m); ms.appendChild(o);
  });
  const cs=document.getElementById("categorySelect");
  [...new Set(EX.map(e=>e.category))].sort().forEach(c=>{
    const o=document.createElement("option"); o.value=c; o.textContent=cap(c); cs.appendChild(o);
  });
}

/* ---------- filtering ---------- */
function filtered(){
  const q=state.q.trim().toLowerCase();
  return EX.filter(e=>{
    if(state.body.size && !state.body.has(e.bodyPart)) return false;
    if(state.equip.size && !state.equip.has(e.equipment)) return false;
    if(state.diff.size && !state.diff.has(e.diff)) return false;
    if(state.favOnly && !isFav(e.id)) return false;
    if(state.muscle && e.muscle!==state.muscle) return false;
    if(state.category && e.category!==state.category) return false;
    if(q && !e.name.toLowerCase().includes(q) && !e.muscle.includes(q)) return false;
    return true;
  });
}

/* ---------- incremental grid rendering ---------- */
let current=[], shown=0; const BATCH=48;
function cardHTML(e){
  return `<div class="card">
    <div class="media" data-open="${e.id}">
      ${imgTag(e)}
      <button class="fav-btn" data-id="${e.id}" title="Favorite">☆</button>
      <button class="add-btn" data-id="${e.id}" title="Add to My Plan">+</button>
    </div>
    <div class="card-body">
      <h3>${e.name}</h3>
      <div class="badges">
        <span class="badge lv ${e.diff}">${cap(e.diff)}</span>
        <span class="badge bp">${BP_LABEL[e.bodyPart]||cap(e.bodyPart)}</span>
        <span class="badge eq">${EQ_LABEL[e.equipment]||cap(e.equipment)}</span>
      </div>
    </div>
  </div>`;
}
function appendBatch(){
  const grid=document.getElementById("grid");
  const slice=current.slice(shown, shown+BATCH);
  grid.insertAdjacentHTML("beforeend", slice.map(cardHTML).join(""));
  shown+=slice.length;
  updatePlanBadges();
  refreshFavButtons();
}
function render(){
  current=filtered(); shown=0;
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  document.getElementById("resultCount").textContent = `${current.length} exercise${current.length!==1?"s":""}`;
  document.getElementById("emptyState").style.display = current.length? "none":"block";
  appendBatch();
}
const io=new IntersectionObserver(es=>{ if(es[0].isIntersecting && shown<current.length) appendBatch(); });
io.observe(document.getElementById("sentinel"));

/* ---------- card interactions (event delegation) ---------- */
document.getElementById("grid").addEventListener("click", ev=>{
  const add=ev.target.closest(".add-btn");
  if(add){ ev.stopPropagation(); togglePlan(add.dataset.id); return; }
  const fav=ev.target.closest(".fav-btn");
  if(fav){ ev.stopPropagation(); toggleFav(fav.dataset.id); return; }
  const open=ev.target.closest("[data-open]");
  if(open) openModal(open.dataset.open);
});

/* ---------- modal ---------- */
function openModal(id){
  const e=byId[id]; if(!e) return;
  const mi=document.getElementById("modalImg");
  mi.parentNode.querySelectorAll(".missing").forEach(x=>x.remove());
  mi.style.display=""; mi.dataset.step=0; mi.dataset.local=e.gif;
  mi.onerror=()=>imgFallback(mi); mi.src=cdnUrl(e); mi.alt=e.name;
  document.getElementById("modalTitle").textContent=e.name;
  const b=[`<span class="badge lv ${e.diff}">${cap(e.diff)}</span>`,
           `<span class="badge reps">${prescribe(e)}</span>`,
           `<span class="badge bp">${BP_LABEL[e.bodyPart]||cap(e.bodyPart)}</span>`,
           `<span class="badge eq">${EQ_LABEL[e.equipment]||cap(e.equipment)}</span>`,
           `<span class="badge bp">${cap(e.muscle)}</span>`];
  (e.secondary||[]).forEach(m=>b.push(`<span class="badge eq">${cap(m)}</span>`));
  document.getElementById("modalBadges").innerHTML=b.join("");
  document.getElementById("modalSteps").innerHTML=(e.steps||[]).map(s=>`<li>${s}</li>`).join("")||"<li>No instructions available.</li>";
  const addBtn=document.getElementById("modalAdd"), favBtn=document.getElementById("modalFav");
  const refresh=()=>{
    addBtn.textContent=inPlan(id)?"✓ In My Plan — remove":"+ Add to My Plan";
    favBtn.textContent=isFav(id)?"★ Favorited":"☆ Favorite";
  };
  addBtn.onclick=()=>{ togglePlan(id); refresh(); };
  favBtn.onclick=()=>{ toggleFav(id); refresh(); };
  refresh();
  document.getElementById("modal").classList.add("open");
}
function closeModal(){ document.getElementById("modal").classList.remove("open");
  document.getElementById("modalImg").src=""; }
document.getElementById("modalClose").onclick=closeModal;
document.getElementById("modal").onclick=e=>{ if(e.target.id==="modal") closeModal(); };
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

/* ---------- search + selects + clear ---------- */
document.getElementById("searchInput").oninput=e=>{ state.q=e.target.value; render(); };
document.getElementById("muscleSelect").onchange=e=>{ state.muscle=e.target.value; render(); };
document.getElementById("categorySelect").onchange=e=>{ state.category=e.target.value; render(); };
document.getElementById("favToggle").onclick=e=>{
  state.favOnly=!state.favOnly; e.target.classList.toggle("on",state.favOnly); render();
};
document.getElementById("clearBtn").onclick=()=>{
  state.q="";state.body.clear();state.equip.clear();state.diff.clear();
  state.muscle="";state.category="";state.favOnly=false;
  document.getElementById("searchInput").value="";
  document.getElementById("muscleSelect").value="";
  document.getElementById("categorySelect").value="";
  document.getElementById("favToggle").classList.remove("on");
  document.querySelectorAll(".chip.on").forEach(c=>c.classList.remove("on"));
  render();
};

/* ---------- view + subtab switching ---------- */
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  const v=t.dataset.view;
  document.getElementById("browseView").style.display = v==="browse"?"block":"none";
  document.getElementById("plansView").style.display  = v==="plans"?"block":"none";
  if(v==="plans") renderPlans();
});
document.querySelectorAll(".subtab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".subtab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  const s=t.dataset.sub;
  document.getElementById("readyPlans").style.display = s==="ready"?"block":"none";
  document.getElementById("myPlan").style.display     = s==="mine"?"block":"none";
  if(s==="mine") renderMyPlan();
});

function miniHTML(id){
  const e=byId[id]; if(!e) return "";
  return `<div class="mini" data-open="${id}">
    <div class="media">${imgTag(e)}</div>
    <span>${e.name} <span class="p-reps badge reps">${prescribe(e)}</span></span></div>`;
}
function planDaysHTML(plan){
  return plan.days.map(d=>`<div class="day"><h3>${d.title}</h3>
    <div class="mini-grid">${d.ids.map(miniHTML).join("")}</div></div>`).join("");
}
function renderPlans(){
  const host=document.getElementById("readyPlans");
  host.innerHTML=PLANS.map((p,i)=>`<div class="plan">
    <div class="plan-head">
      <div><h2>${p.name}</h2><p>${p.desc}</p></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span class="plan-tag">${p.tag}</span>
        <button class="btn primary" data-load="${i}">Copy to My Plan</button>
      </div>
    </div>${planDaysHTML(p)}</div>`).join("");
  host.querySelectorAll("[data-load]").forEach(b=>b.onclick=()=>{
    const p=PLANS[+b.dataset.load];
    const ids=p.days.flatMap(d=>d.ids).filter(id=>byId[id]);
    ids.forEach(id=>{ if(!myPlan.includes(id)) myPlan.push(id); });
    savePlan();
    b.textContent="✓ Added"; setTimeout(()=>b.textContent="Copy to My Plan",1400);
  });
  host.querySelectorAll("[data-open]").forEach(m=>m.onclick=()=>openModal(m.dataset.open));
}

/* ---------- my plan ---------- */
function renderMyPlan(){
  const host=document.getElementById("myPlan");
  if(!myPlan.length){
    host.innerHTML=`<div class="plan-empty">
      <p>Your plan is empty.</p>
      <p style="font-size:.88rem">Add exercises with the <strong>+</strong> button while browsing,
      or copy a ready-made plan to get started.</p></div>`;
    return;
  }
  const items=myPlan.map(id=>byId[id]).filter(Boolean);
  host.innerHTML=`
    <div class="print-only"><h1>My Workout Plan</h1><p>${items.length} exercises · generated with Gym Trainer</p></div>
    <div class="plan">
    <div class="plan-head">
      <div><h2>My Plan</h2><p>${items.length} exercise${items.length!==1?"s":""} · saved in this browser.</p></div>
      <div style="display:flex;gap:8px">
        <button class="btn primary" id="printPlan">⬇ Export PDF</button>
        <button class="btn ghost" id="clearPlan">Clear all</button>
      </div>
    </div>
    <div class="mini-grid" style="margin-top:16px">
      ${items.map(e=>`<div class="mini">
        <div class="media" data-open="${e.id}">${imgTag(e)}</div>
        <span>${e.name} <span class="p-reps badge reps">${prescribe(e)}</span>
          <br><button class="clear-btn" style="margin:6px 0 2px;padding:3px 9px" data-rm="${e.id}">Remove</button></span>
      </div>`).join("")}
    </div></div>`;
  host.querySelectorAll("[data-open]").forEach(m=>m.onclick=()=>openModal(m.dataset.open));
  host.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>{ togglePlan(b.dataset.rm); renderMyPlan(); });
  document.getElementById("clearPlan").onclick=()=>{ if(confirm("Clear your whole plan?")){ myPlan=[]; savePlan(); renderMyPlan(); } };
  document.getElementById("printPlan").onclick=()=>window.print();
}

/* ---------- boot ---------- */

}else{
  buildChips(); render(); updatePlanBadges();
}
